<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세상을 바꾸는 유토피아</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e8e8f0;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      max-width: 100%;
    }
    .nav-logo {
      font-size: 1.4rem; font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a {
      color: #a8a8b8; text-decoration: none; font-size: 0.95rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }

    /* Container */
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

    /* Hero */
    .hero {
      text-align: center;
      padding: 160px 0 100px;
    }
    .hero h1 {
      font-size: 3.5rem; font-weight: 700; margin-bottom: 24px;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
      background-size: 300% 300%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 4s ease infinite;
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .hero p {
      font-size: 1.1rem; color: #888; max-width: 500px;
      margin: 0 auto 40px; line-height: 1.7;
    }
    .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 12px 28px; border-radius: 9999px; border: none;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      color: #000; font-weight: 600; font-size: 1rem;
      text-decoration: none; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline {
      padding: 12px 28px; border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: #e8e8f0;
      font-weight: 600; font-size: 1rem;
      text-decoration: none; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: #48dbfb; color: #48dbfb; }

    /* Section Title */
    .section-title {
      font-size: 1.5rem; font-weight: 700; color: #fff;
      margin-bottom: 32px;
    }

    /* Cards */
    .posts { padding-bottom: 80px; }
    .card {
      display: block;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }
    .card:hover {
      border-color: transparent;
      background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(84,160,255,0.1));
      box-shadow: 0 0 30px rgba(255,107,107,0.15), 0 0 60px rgba(84,160,255,0.1);
      transform: translateY(-4px);
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .tag {
      padding: 4px 12px; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 600;
    }
    .card h3 {
      font-size: 1.2rem; font-weight: 600; color: #fff;
      margin-bottom: 8px;
    }
    .card p { color: #888; font-size: 0.9rem; margin-bottom: 8px; line-height: 1.6; }
    .card time { color: #555; font-size: 0.8rem; }

    /* Footer */
    footer {
      text-align: center; padding: 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: #555; font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .hero h1 { font-size: 2.2rem; }
      .hero { padding: 120px 0 60px; }
      nav { padding: 12px 16px; }
      .nav-links { gap: 16px; }
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="/" class="nav-logo">JG</a>
  <div class="nav-links">
    <a href="/">홈</a>
    <a href="/blog/us-iran-war-korea-analysis.html">블로그</a>
  </div>
</nav>

<div class="container">

  <!-- Hero Section -->
  <section class="hero">
    <h1>세상을 바꾸는 유토피아</h1>
    <p>개발과 창작을 좋아하는 사람입니다. 이곳에서 제 생각과 작업물을 공유합니다.</p>
    <div class="hero-buttons">
      <a href="#posts" class="btn-primary">블로그 보기</a>
      <a href="https://my-project-2026-claudecodeinit.vercel.app/portfolio" class="btn-outline">포트폴리오</a>
    </div>
  </section>

  <!-- Recent Posts -->
  <section class="posts" id="posts">
    <h2 class="section-title">최근 글</h2>

    <a href="/blog/us-iran-war-korea-analysis.html" class="card">
      <div class="card-tags">
        <span class="tag" style="background:rgba(255,107,107,0.2);color:#ff6b6b;">국제정치</span>
        <span class="tag" style="background:rgba(254,202,87,0.2);color:#feca57;">미이란전쟁</span>
        <span class="tag" style="background:rgba(72,219,251,0.2);color:#48dbfb;">한국경제</span>
        <span class="tag" style="background:rgba(84,160,255,0.2);color:#54a0ff;">미중관계</span>
        <span class="tag" style="background:rgba(255,159,243,0.2);color:#ff9ff3;">안보</span>
      </div>
      <h3>미국-이란 전쟁과 한반도, 그리고 미중 대결의 새로운 지형</h3>
      <p>2026년 미국-이란 전쟁이 한국의 안보·경제에 미치는 영향과 미중 대결 구조의 재편을 종합 분석합니다.</p>
      <time>2026-03-15</time>
    </a>

  </section>

</div>

<!-- Footer -->
<footer>
  &copy; 2026 JG. All rights reserved.
</footer>

</body>
</html>
