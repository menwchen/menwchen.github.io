<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e8e8f0;
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    word-break: keep-all;
    letter-spacing: -0.01em;
  }
  img { max-width: 100%; height: auto; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,15,26,0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
  }
  .nav-logo {
    font-size: 1.4rem; font-weight: 700;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a {
    color: #a8a8b8; text-decoration: none; font-size: 0.95rem;
    transition: color 0.2s; padding: 8px 4px; min-height: 44px;
    display: inline-flex; align-items: center;
  }
  .nav-links a:hover { color: #fff; }
  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

  /* Hero */
  .hero { text-align: center; padding: 160px 0 100px; }
  .hero h1 {
    font-size: 3.5rem; font-weight: 700; margin-bottom: 24px;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
    background-size: 300% 300%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradient-shift 4s ease infinite;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .hero p {
    font-size: 1.1rem; color: #888; max-width: 500px;
    margin: 0 auto 40px; line-height: 1.7;
  }
  .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    padding: 12px 28px; border-radius: 9999px; border: none;
    background: linear-gradient(135deg, #ff6b6b, #feca57);
    color: #000; font-weight: 600; font-size: 1rem;
    text-decoration: none; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-outline {
    padding: 12px 28px; border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent; color: #e8e8f0;
    font-weight: 600; font-size: 1rem;
    text-decoration: none; transition: all 0.2s;
  }
  .btn-outline:hover { border-color: #48dbfb; color: #48dbfb; }

  /* Categories grid */
  .categories a:hover {
    border-color: transparent;
    background: linear-gradient(135deg, rgba(255,107,107,0.12), rgba(84,160,255,0.12)) !important;
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(255,107,107,0.1);
  }

  /* Cards */
  .section-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 32px; }
  .card {
    display: block;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 28px; margin-bottom: 20px;
    text-decoration: none; color: inherit; transition: all 0.3s ease;
  }
  .card:hover {
    border-color: transparent;
    background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(84,160,255,0.1));
    box-shadow: 0 0 30px rgba(255,107,107,0.15), 0 0 60px rgba(84,160,255,0.1);
    transform: translateY(-4px);
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .tag { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .card h3 { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .card p { color: #888; font-size: 0.9rem; margin-bottom: 8px; line-height: 1.6; }
  .card time { color: #555; font-size: 0.8rem; }

  /* Post page */
  .post-header { padding-top: 100px; margin-bottom: 2em; }
  .post-header h1 {
    font-size: 2.2rem; font-weight: 700; margin-bottom: 16px;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
    background-size: 300% 300%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradient-shift 4s ease infinite;
  }
  .post-date { color: #a8a8b8; font-size: 0.9rem; }
  .post-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 2em; }
  .post-views { color: #888; font-size: 0.85rem; }

  /* Giscus comments */
  .comments-section { margin-top: 60px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.08); }
  .comments-section h2 { font-size: 1.3rem; color: #fff; margin-bottom: 24px; }

  /* Post content */
  .post-content { line-height: 1.8; max-width: 800px; font-size: 17px; }
  .post-content h1, .post-content h2, .post-content h3, .post-content h4 { color: #fff; margin-top: 2em; margin-bottom: 0.5em; }
  .post-content h2 { font-size: 1.5rem; padding-bottom: 0.4em; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .post-content h3 { font-size: 1.25rem; }
  .post-content h4 { font-size: 1.1rem; }
  .post-content p { color: #c8c8d8; margin-bottom: 1.5em; line-height: 1.85; }
  .post-content strong { color: #fff; }
  .post-content a { color: #54a0ff; text-decoration: underline; }
  .post-content ul, .post-content ol { color: #c8c8d8; padding-left: 1.5em; margin-bottom: 1.5em; }
  .post-content li { margin-bottom: 0.5em; line-height: 1.8; }
  .post-content blockquote {
    border-left: 3px solid #ff6b6b; padding: 0.8em 1.2em;
    color: #a8a8b8; font-style: italic; margin-bottom: 1.25em;
    background: rgba(255,107,107,0.05); border-radius: 0 8px 8px 0;
  }
  .post-content hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 2.5em 0; }
  .post-content table {
    width: 100%; border-collapse: collapse; margin-bottom: 1.5em;
    background: rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden;
  }
  .post-content th {
    padding: 12px 16px; text-align: left; color: #fff; font-weight: 600;
    border-bottom: 2px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
  }
  .post-content td { padding: 12px 16px; color: #c8c8d8; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .post-content code {
    background: rgba(255,255,255,0.1); padding: 2px 6px;
    border-radius: 4px; font-size: 0.9em;
  }
  .post-content pre {
    background: rgba(0,0,0,0.4); padding: 1.25em;
    border-radius: 12px; overflow-x: auto; margin-bottom: 1.5em;
  }
  .post-content pre code { background: none; padding: 0; }

  footer {
    text-align: center; padding: 32px;
    border-top: 1px solid rgba(255,255,255,0.06);
    color: #555; font-size: 0.85rem;
    margin-top: 60px;
  }

  /* Back link */
  .back-link {
    display: inline-block; color: #a8a8b8; text-decoration: none;
    font-size: 0.9rem; padding: 8px 0; transition: color 0.2s;
  }
  .back-link:hover { color: #48dbfb; }

  @media (max-width: 768px) {
    .container { padding: 0 20px; }
    .hero h1 { font-size: 2.6rem; }
    .post-content { font-size: 16.5px; }
    .card { padding: 22px; }
  }

  @media (max-width: 640px) {
    .hero h1 { font-size: 2rem; }
    .hero { padding: 120px 0 60px; }
    .hero p { font-size: 1rem; }
    nav { padding: 12px 16px; }
    .container { padding: 0 16px; }
    .post-header { padding-top: 80px; }
    .post-header h1 { font-size: 1.5rem; }
    .post-content { font-size: 16px; }
    .post-content p { margin-bottom: 1.3em; }
    .card { padding: 20px; margin-bottom: 16px; border-radius: 12px; }
    .card h3 { font-size: 1.1rem; }
    .card-tags { gap: 6px; }
    .tag { font-size: 0.7rem; padding: 3px 10px; }
    .section-title { font-size: 1.3rem; margin-bottom: 24px; }
    .hero-buttons { flex-direction: column; align-items: center; }
    .btn-primary, .btn-outline { width: 100%; max-width: 280px; text-align: center; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
  }
</style>
