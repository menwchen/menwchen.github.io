name: WhoWin · 송영길 데이터 갱신

on:
  schedule:
    # 매 3시간마다 (UTC 기준) — KST 로 9시·12시·15시·18시·21시·0시·3시·6시
    - cron: "5 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: whowin-update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run text-mining script
        run: python scripts/whowin_update.py

      - name: Commit & push if changed
        run: |
          git config user.name  "whowin-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/whowin/songyounggil.json
          if git diff --cached --quiet; then
            echo "No data change."
            exit 0
          fi
          git commit -m "data(whowin): refresh songyounggil snapshot · $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
