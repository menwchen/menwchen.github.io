<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="-apple-system, 'Malgun Gothic', sans-serif">
  <rect width="880" height="600" fill="#ffffff"/>
  <text x="40" y="42" font-size="21" font-weight="700" fill="#111">Simms가 본 미국의 힘 vs. 그가 묻지 않은 것</text>
  <text x="40" y="67" font-size="13" fill="#777">"exorbitant privilege"를 강대국 자산으로 셈하는 지정학 — 그러나 그 특권의 분배적 이면은 침묵 속에 남는다</text>
  <rect x="40" y="92" width="370" height="468" rx="6" fill="#f7f7f7" stroke="#ddd"/>
  <text x="60" y="124" font-size="15" font-weight="700" fill="#111">① Simms의 독법 — 권력의 목록</text>
  <g font-size="13.5" fill="#222">
    <text x="62" y="162" font-weight="700">글로벌 코먼스 통제</text>
    <text x="62" y="184" fill="#555">· 해상로 · 광케이블 · 공급망 ·</text>
    <text x="62" y="204" fill="#555">  금융 배관(financial plumbing)</text>
    <text x="62" y="244" font-weight="700">"지하 제국"(underground empire)</text>
    <text x="62" y="266" fill="#555">· 9·11 이후 감시·차단 인프라</text>
    <text x="62" y="286" fill="#555">· 세계 인터넷 트래픽의 경유·감청</text>
    <text x="62" y="326" font-weight="700">달러 패권</text>
    <text x="62" y="348" fill="#555">· 기축통화 · 안전자산 · 결제수단</text>
    <text x="62" y="368" fill="#555">· 라이벌을 시스템에서 "뽑아버릴"</text>
    <text x="62" y="388" fill="#555">  능력 (sanctions의 공포)</text>
    <text x="62" y="428" font-weight="700">→ 결론: Reach·Reputation의 자산</text>
    <text x="62" y="450" fill="#555">  "가장 강한 강대국의 토대"</text>
  </g>
  <text x="62" y="506" font-size="12" fill="#999" font-style="italic">지스카르 데스탱: "과도한 특권"</text>
  <text x="62" y="528" font-size="12" fill="#999" font-style="italic">— Simms는 이를 힘으로만 계상한다</text>
  <line x1="418" y1="326" x2="468" y2="326" stroke="#111" stroke-width="2"/>
  <polygon points="468,320 480,326 468,332" fill="#111"/>
  <text x="424" y="316" font-size="11" fill="#111">같은 사실,</text>
  <text x="424" y="346" font-size="11" fill="#111">다른 질문</text>
  <rect x="490" y="92" width="350" height="468" rx="6" fill="#111"/>
  <text x="510" y="124" font-size="15" font-weight="700" fill="#fff">② Simms가 묻지 않은 것 — 분배</text>
  <g font-size="13.5" fill="#eee">
    <text x="512" y="162" font-weight="700" fill="#fff">화폐는 누구의 약속인가?</text>
    <text x="512" y="184" fill="#bbb">달러 특권은 미국 시민 전체의</text>
    <text x="512" y="204" fill="#bbb">공통 자산(共有部)이 아니라</text>
    <text x="512" y="224" fill="#bbb">자산 보유 계층에 비대칭 귀속</text>
    <text x="512" y="264" font-weight="700" fill="#fff">r &gt; g 의 외생화</text>
    <text x="512" y="286" fill="#bbb">기축통화가 저금리를 유지시키나</text>
    <text x="512" y="306" fill="#bbb">그 수혜는 자산시장 진입자에게,</text>
    <text x="512" y="326" fill="#bbb">청구서는 신규 세대에게</text>
    <text x="512" y="366" font-weight="700" fill="#fff">준주변부의 종속</text>
    <text x="512" y="388" fill="#bbb">달러 장기금리 환경이 한국 등</text>
    <text x="512" y="408" fill="#bbb">semi-periphery의 시장금리를</text>
    <text x="512" y="428" fill="#bbb">외생적으로 결정 (금리 종속변수화)</text>
    <text x="512" y="468" font-weight="700" fill="#fff">→ 강대국 "지위"의 내부 분배비용</text>
    <text x="512" y="490" fill="#bbb">= Simms 지정학이 비워둔 자리</text>
  </g>
  <text x="512" y="534" font-size="12" fill="#888" font-style="italic">공유부·기본사회가 던지는 반문(反問)</text>
</svg>
